<?xml version="1.0" encoding="UTF-8"?>
<!-- Netatmo Community — app icon. Security camera glyph, transparent. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <g fill="#FF7A00" stroke="none">
    <!-- Ceiling mount plate -->
    <rect x="104" y="36" width="48" height="10" rx="4"/>
    <!-- Mount stem -->
    <rect x="124" y="46" width="8" height="24"/>

    <!-- Camera body -->
    <rect x="40" y="82" width="144" height="68" rx="18"/>

    <!-- Bracket extending to the right -->
    <path d="M184 104 h26 a10 10 0 0 1 10 10 v8 a10 10 0 0 1 -10 10 h-26 z"/>

    <!-- Lens -->
    <circle cx="148" cy="116" r="24" fill="#1f1f1f"/>
    <circle cx="148" cy="116" r="10" fill="#FF7A00"/>

    <!-- Status LED -->
    <circle cx="60" cy="102" r="5" fill="#1f1f1f"/>
  </g>

  <!-- Wi-Fi symbol below the camera -->
  <g transform="translate(72 208)">
    <circle cx="0" cy="0" r="7" fill="#FF7A00"/>
    <g fill="none" stroke="#FF7A00" stroke-linecap="round" stroke-width="9">
      <path d="M -18 -8 a20 20 0 0 1 36 0"/>
      <path d="M -36 -18 a40 40 0 0 1 72 0"/>
    </g>
  </g>
</svg>
